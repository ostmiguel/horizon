name: Deploy to production

on:
  push:
    branches: [main]
    paths:
      - 'releases/budget-v2.html'
      - 'releases/landing.html'
      - 'chart.js'
      - 'personal_budget/horizon-api/**'
      - 'scripts/deploy_remote.sh'
      - '.github/workflows/deploy.yml'
      - 'docs/privacy.html'
      - 'docs/terms.html'
      - 'docs/consent.html'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_key
          chmod 600 ~/.ssh/id_key

      - name: Build tarball
        run: |
          tar czf /tmp/hzbuild.tgz \
            releases/budget-v2.html \
            releases/landing.html \
            chart.js \
            personal_budget/horizon-api/forecast_cron.py \
            personal_budget/horizon-api/metrics_core.py \
            personal_budget/horizon-api/plan_materialize.py \
            personal_budget/horizon-api/seed_user.py \
            personal_budget/horizon-api/main.py \
            personal_budget/horizon-api/middleware.py \
            personal_budget/horizon-api/routers \
            personal_budget/horizon-api/migrations \
            personal_budget/horizon-api/deploy \
            docs/privacy.html \
            docs/terms.html \
            docs/consent.html

      # ── scp + ssh с авто-ретраями (лечит flaky connection refused / i/o timeout) ──
      - name: Deploy with retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 12
          max_attempts: 5
          retry_wait_seconds: 25
          command: |
            SSHOPTS="-i $HOME/.ssh/id_key -o StrictHostKeyChecking=no -o ConnectTimeout=25 -o ServerAliveInterval=10 -o ServerAliveCountMax=6"
            scp $SSHOPTS /tmp/hzbuild.tgz root@109.71.247.58:/tmp/hzbuild.tgz
            ssh $SSHOPTS root@109.71.247.58 'bash -s' < scripts/deploy_remote.sh
