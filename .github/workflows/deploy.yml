name: Deploy to production

on:
  push:
    branches: [main]
    paths:
      - 'releases/budget-v2.html'
      - 'personal_budget/horizon-api/forecast_cron.py'
      - 'personal_budget/horizon-api/routers/metrics.py'
      - 'personal_budget/horizon-api/main.py'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 109.71.247.58
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: echo "connected"

      - name: Copy file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 109.71.247.58
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: releases/budget-v2.html
          target: /tmp/
          strip_components: 1

      - name: Rename to index.html
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 109.71.247.58
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: mv /tmp/budget-v2.html /opt/horizon/personal_budget/horizon-api/static/index.html

      - name: Copy forecast_cron.py
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 109.71.247.58
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: personal_budget/horizon-api/forecast_cron.py
          target: /opt/horizon/personal_budget/horizon-api/
          strip_components: 2

      - name: Copy metrics router and main.py
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 109.71.247.58
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "personal_budget/horizon-api/routers/metrics.py,personal_budget/horizon-api/main.py"
          target: /opt/horizon/personal_budget/horizon-api/
          strip_components: 2

      - name: Restart API
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 109.71.247.58
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: systemctl restart horizon-api
